name: 01 - CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  code-quality:
    name: Code Quality (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          echo "Running flake8 on QuickStay..."
          flake8 app/ run.py --max-line-length=120 --exclude=venv,migrations || true
          echo "flake8 check complete! (warnings noted but not failing the build)"

  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          echo "Running bandit security scan..."
          bandit -r app/ -ll --exclude app/static
          echo "bandit scan complete!"

  tests:
    name: Run Tests (pytest)
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pytest
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
        run: |
          echo "Running pytest..."
          pytest tests/ -v
          echo "All tests passed!"

  