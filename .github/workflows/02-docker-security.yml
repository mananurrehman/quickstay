name: 02 - Docker Security

on:
  workflow_run:
    workflows: ["01 - CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
    
    dockerfile-lint:
        name: Dockerfile Lint (hadolint)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run hadolint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: 'Dockerfile'
                failure-threshold: 'error'
              continue-on-error: false

            - name: Show hadolint result
              run: echo "Hadolint scan Complete!"

    dependency-scan:
        name: Dependency Scan (pip-audit)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
            
            - name: Install pip-audit
              run: pip install pip-audit

            - name: Run pip-audit
              run: |
                echo "Scanning dependencies for known vulnerabilities..."
                pip-audit -r requirements.txt || true
                echo "Pip-audit Scan Complete!"
    
    image-scan:
        name: Image Scan (Trivy)
        runs-on: ubuntu-latest
        needs: dockerfile-lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker Image
              run: | 
                echo "Building QuickStay Docker Image"
                docker build -t quickstay:test .

            - name: Run Trivy Vulnerability Scan
              uses: aquasecurity/trivy-action@master
              with: 
                image-ref: 'quickstay:test'
                format: 'table'
                exit-code: '0'
                severity: 'CRITICAL,HIGH'
                ignore-unfixed: false
            
            - name: Show Scan Complete
              run: echo "Trivy Image Scan Complete!"